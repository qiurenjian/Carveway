services:
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - infra_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  infra_net:
    name: infra_net
