name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/services/carveway-web

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p 2222 -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Sync out/ to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -avz --delete --checksum \
            -e "ssh -i $HOME/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no" \
            out/ "$SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/out/"

      - name: Sync deploy configs
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          SSH_CMD="ssh -i $HOME/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no"
          rsync -avz -e "$SSH_CMD" \
            deploy/ "$SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/deploy/"
          rsync -avz -e "$SSH_CMD" \
            docker-compose.prebuilt.yml \
            "$SSH_USER@$SSH_HOST:${{ env.DEPLOY_PATH }}/docker-compose.yml"

      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i "$HOME/.ssh/deploy_key" \
              -p 2222 \
              -o StrictHostKeyChecking=no \
              "$SSH_USER@$SSH_HOST" << 'ENDSSH'
            set -e
            cd /opt/services/carveway-web
            echo "=== Building image ==="
            docker compose -p carveway-web build --no-cache
            echo "=== Starting container ==="
            docker compose -p carveway-web up -d
            echo "=== Pruning old images ==="
            docker image prune -f
            echo "=== Container status ==="
            docker ps | grep carveway-web
            echo "Deploy done: $(date)"
          ENDSSH
